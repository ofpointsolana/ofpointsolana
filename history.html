<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>History of .</title>

<style>
:root{
  --bg:#ffffff;
  --fg:#000000;
}

body{
  margin:0;
  padding:60px 24px;
  background:var(--bg);
  color:var(--fg);
  font-family: monospace;
  text-align:center;
}

h1{
  font-size:64px;
  margin-bottom:40px;
}

p{
  max-width:600px;
  margin:auto;
  line-height:1.7;
  font-size:16px;
}

/* wikipedia arrow */
.wiki{
  display:inline-block;
  margin-top:36px;
  font-size:32px;
  text-decoration:none;
  color:var(--fg);
  border:2px solid var(--fg);
  padding:6px 18px;
  border-radius:8px;
}
.wiki:hover{
  background:var(--fg);
  color:var(--bg);
}

/* resource dots */
.links{
  margin-top:70px;
}
.links a{
  width:12px;
  height:12px;
  background:var(--fg);
  border-radius:50%;
  display:inline-block;
  margin:0 14px;
  opacity:0.3;
}
.links a:hover{ opacity:0.8; }
</style>
</head>

<body>

<p>

<br><br>

</p>
